<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Messenger</title>

<link rel="stylesheet"
href="style.css">
</head>

<body>

<div id="app">

    <div id="sidebar">

        <h2>Messenger</h2>

        <button id="newDM">
            New DM
        </button>

        <div id="users"></div>

    </div>

    <div id="chat">

        <div id="messages"></div>

        <div id="inputBar">

            <input
                id="messageInput"
                placeholder="Message">

            <button
                id="sendBtn">

                Send

            </button>

        </div>

    </div>

</div>

<script src="database.js"></script>
<script src="websocket.js"></script>
<script src="app.js"></script>

</body>
</html>
